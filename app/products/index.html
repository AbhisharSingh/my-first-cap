<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        h1 { color: #0070f3; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        th { background: #0070f3; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background: #f0f7ff; }
        .badge { padding: 4px 10px; border-radius: 12px; font-size: 12px; background: #d4edda; color: #155724; }
        h2 { margin-top: 40px; color: #333; }
    </style>
</head>
<body>
    <h1>🛒 Product Management</h1>
    <h2>Products</h2>
    <table id="products-table">
        <thead><tr><th>ID</th><th>Name</th><th>Category</th><th>Price (₹)</th><th>Stock</th><th>Status</th></tr></thead>
        <tbody id="products-body"><tr><td colspan="6">Loading...</td></tr></tbody>
    </table>
    <h2>Orders</h2>
    <table id="orders-table">
        <thead><tr><th>ID</th><th>Customer</th><th>Qty</th><th>Total (₹)</th><th>Date</th></tr></thead>
        <tbody id="orders-body"><tr><td colspan="5">Loading...</td></tr></tbody>
    </table>
    <script>
        fetch('/odata/v4/product/Products')
            .then(r => r.json())
            .then(data => {
                document.getElementById('products-body').innerHTML = data.value.map(p => `
                    <tr>
                        <td>${p.ID}</td>
                        <td><strong>${p.name}</strong></td>
                        <td>${p.category}</td>
                        <td>₹${p.price.toLocaleString()}</td>
                        <td>${p.stock}</td>
                        <td><span class="badge">${p.stockStatus}</span></td>
                    </tr>`).join('');
            });
        fetch('/odata/v4/product/Orders')
            .then(r => r.json())
            .then(data => {
                document.getElementById('orders-body').innerHTML = data.value.map(o => `
                    <tr>
                        <td>${o.ID}</td>
                        <td>${o.customer}</td>
                        <td>${o.quantity}</td>
                        <td>₹${o.totalPrice.toLocaleString()}</td>
                        <td>${o.orderDate}</td>
                    </tr>`).join('');
            });
    </script>
</body>
</html>
